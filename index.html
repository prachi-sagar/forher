<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 100%);
            min-height: 100vh;
        }

        /* Floating Hearts Background */
        .heart-container {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 105, 180, 0.6);
            transform: rotate(45deg);
            animation: float 15s infinite ease-in-out;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 105, 180, 0.6);
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 10px;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(45deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(45deg);
                opacity: 0;
            }
        }

        /* Page Container */
        .page {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .page.active {
            display: flex;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Page 1 - Question */
        .question-page {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .question-page h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #d63384;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .button-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d 0%, #c94b7f 100%);
            color: white;
            z-index: 2;
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
        }

        .btn-no {
            background: linear-gradient(135deg, #e0e0e0 0%, #bdbdbd 100%);
            color: #666;
            position: absolute;
            transition: all 0.3s ease;
        }

        /* Page 2 - Acceptance */
        .acceptance-page {
            flex-direction: column;
            padding: 40px 20px;
            align-items: center;
        }

        .teddy-section {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .teddy-bear {
            font-size: 150px;
            margin-bottom: 20px;
            display: inline-block;
            animation: swing 2s infinite ease-in-out;
        }

        @keyframes swing {
            0%, 100% {
                transform: rotate(-5deg);
            }
            50% {
                transform: rotate(5deg);
            }
        }

        .teddy-section h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: #d63384;
            margin-top: 20px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .card h3 {
            color: #d63384;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .card p {
            color: #666;
            font-size: 0.95rem;
        }

        .card.locked {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .lock-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
        }

        /* Modal/Overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            animation: scaleIn 0.4s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #f0f0f0;
            color: #333;
        }

        .modal-content h2 {
            color: #d63384;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content img {
            width: 100%;
            max-width: 400px;
            max-height: 500px;
            height: auto;
            object-fit: cover;
            border-radius: 15px;
            margin: 20px auto;
            display: block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal-content .message {
            line-height: 1.8;
            color: #555;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Valentine's Day Special Scene */
        .valentine-scene {
            text-align: center;
            padding: 40px 20px;
        }

        .valentine-scene h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: #d63384;
            margin-bottom: 30px;
            animation: typing 3s steps(40);
        }

        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        .dancing-couple {
            font-size: 120px;
            margin: 40px 0;
            animation: dance 2s infinite ease-in-out;
        }

        @keyframes dance {
            0%, 100% {
                transform: translateX(-10px) rotate(-5deg);
            }
            50% {
                transform: translateX(10px) rotate(5deg);
            }
        }

        /* Birthday Album */
        .album-container {
            perspective: 1500px;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        .album-page {
            background: #fff8f0;
            border: 2px solid #d4a574;
            border-radius: 10px;
            padding: 40px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: pageFlip 0.8s ease;
        }

        @keyframes pageFlip {
            from {
                transform: rotateY(-90deg);
                opacity: 0;
            }
            to {
                transform: rotateY(0);
                opacity: 1;
            }
        }

        .album-page img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            margin: 20px auto;
            display: block;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .album-page p {
            color: #5a5a5a;
            line-height: 1.8;
            font-size: 1.1rem;
            text-align: center;
            font-style: italic;
            margin-top: 20px;
        }

        .page-nav {
            text-align: center;
            margin-top: 30px;
        }

        .page-nav button {
            background: #d63384;
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .page-nav button:hover {
            background: #c94b7f;
            transform: translateY(-2px);
        }

        .page-nav button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Locked Message */
        .locked-message {
            text-align: center;
            padding: 60px 20px;
        }

        .locked-message h2 {
            color: #d63384;
            font-size: clamp(1.5rem, 3vw, 2rem);
            margin-bottom: 20px;
        }

        .locked-message p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .countdown {
            font-size: 2rem;
            color: #ff6b9d;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .teddy-bear {
                font-size: 100px;
            }

            .btn {
                padding: 15px 30px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Hearts Background -->
    <div class="heart-container" id="heartContainer"></div>

    <!-- Background Music -->
    <audio id="backgroundMusic" loop>
        <source src="valentine-song.mp3" type="audio/mpeg">
    </audio>

    <!-- Page 1: Question -->
    <div class="page active" id="page1">
        <div class="question-page">
            <h1>Will you be my Valentine? 💝</h1>
            <div class="button-container">
                <button class="btn btn-yes" id="btnYes">Yes ❤️</button>
                <button class="btn btn-no" id="btnNo">No 😢</button>
            </div>
        </div>
    </div>

    <!-- Page 2: Acceptance -->

                <div class="teddy-bear">🧸🌹</div>
                <h2>You will be my Valentine 💖</h2>
            </div>

            <div class="cards-grid">
                <div class="card" data-card="1">
                    <div class="card-icon">💌</div>
                    <h3>Love Letter 1</h3>
                    <p>A special message just for you</p>
                </div>

                <div class="card" data-card="2">

                    <h3>Love Letter 2</h3>
                    <p>More reasons why you're special</p>
                </div>

                <div class="card" data-card="3" id="valentineCard">
                    <div class="card-icon">🌹</div>
                    <h3>Valentine's Day Special</h3>
                    
                </div>

                <div class="card" data-card="4" id="birthdayCard">
                    <div class="card-icon">🎂</div>
                    <h3>Birthday Special</h3>
                    <p>Opens on March 24th</p>
                    <span class="lock-icon">🔒</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Cards -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <button class="close-btn" id="closeModal">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Generate floating hearts
        function createHearts() {
            const container = document.getElementById('heartContainer');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 15 + 's';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(heart);
            }
        }
        createHearts();

        // Page 1: Button Logic
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        let noClickCount = 0;

        btnNo.addEventListener('mouseover', function() {
            noClickCount++;
            
            // Make Yes button bigger
            const currentSize = parseFloat(window.getComputedStyle(btnYes).fontSize);
            btnYes.style.fontSize = (currentSize + 5) + 'px';
            btnYes.style.padding = (20 + noClickCount * 5) + 'px ' + (40 + noClickCount * 10) + 'px';
            
            // Move No button randomly
            const container = document.querySelector('.button-container');
            const containerRect = container.getBoundingClientRect();
            const btnRect = btnNo.getBoundingClientRect();
            
            const maxX = containerRect.width - btnRect.width;
            const maxY = containerRect.height - btnRect.height;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
            
            // After several attempts, make Yes button cover everything
            if (noClickCount > 5) {
                btnYes.style.fontSize = '3rem';
                btnYes.style.padding = '100px 150px';
                btnYes.style.zIndex = '10';
            }
        });

        btnYes.addEventListener('click', function() {
            // Start background music
            const music = document.getElementById('backgroundMusic');
            music.play().catch(function(error) {
                console.log('Music autoplay prevented:', error);
            });
            
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
        });

        // Modal functionality
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modalBody');
        const closeModal = document.getElementById('closeModal');

        closeModal.addEventListener('click', function() {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Card click handlers
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const cardNum = this.dataset.card;
                handleCardClick(cardNum);
            });
        });

        function handleCardClick(cardNum) {
            const today = new Date();
            
            if (cardNum === '1') {
                showLoveLetter1();
            } else if (cardNum === '2') {
                showLoveLetter2();
            } else if (cardNum === '3') {
                // Valentine's Day - February 14
                // ⚠️ ON 14TH FEBRUARY: This will automatically unlock and show the Valentine's Day card ⚠️
                if (today.getMonth() === 1 ) {
                    showValentineDay();
                } else {
                    showLockedMessage('Valentine\'s Day Special', 'February 14');
                }
            } else if (cardNum === '4') {
                // Birthday - March 24
                // ⚠️ ON 24TH MARCH: This will automatically unlock and show the Birthday album ⚠️
                if (today.getMonth() === 2 && today.getDate() === 24) {
                    showBirthdayAlbum();
                } else {
                    showLockedMessage('Birthday Special', 'March 24');
                }
            }
        }

                        <div class="album-navigation" style="display: flex; justify-content: space-between; 
                                                             align-items: center; margin-top: 30px; gap: 15px;">
                            <button id="prevPhoto" ${currentPhoto === 0 ? 'disabled' : ''} 
                                    style="background: linear-gradient(135deg, #ff6b9d 0%, #c94b7f 100%); 
                                           color: white; border: none; padding: 12px 25px; border-radius: 25px; 
                                           cursor: pointer; font-size: 1rem; font-weight: bold; 
                                           transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(255,107,157,0.3);
                                           ${currentPhoto === 0 ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                                ← Previous
                            </button>
                            
                            <div style="text-align: center; flex: 1;">
                                <div style="display: flex; justify-content: center; gap: 5px; flex-wrap: wrap;">
                                    ${photos.map((_, idx) => `
                                        <div style="width: 8px; height: 8px; border-radius: 50%; 
                                                    background: ${idx === currentPhoto ? '#ff6b9d' : '#ffc0d0'}; 
                                                    transition: all 0.3s ease;"></div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <button id="nextPhoto" ${currentPhoto === photos.length - 1 ? 'disabled' : ''} 
                                    style="background: linear-gradient(135deg, #ff6b9d 0%, #c94b7f 100%); 
                                           color: white; border: none; padding: 12px 25px; border-radius: 25px; 
                                           cursor: pointer; font-size: 1rem; font-weight: bold; 
                                           transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(255,107,157,0.3);
                                           ${currentPhoto === photos.length - 1 ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                                Next →
                            </button>
                        </div>
                        
                        ${currentPhoto === photos.length - 1 ? `
                            <div style="text-align: center; margin-top: 30px; padding: 25px; 
                                        background: linear-gradient(135deg, #ffe0f0 0%, #ffeef8 100%); 
                                        border-radius: 15px; animation: finalMessagePulse 2s infinite;">
                                <h2 style="color: #d63384; font-size: 1.8rem; margin-bottom: 15px;">
                                    I Love You More Than Words Can Say! 💖
                                </h2>
                                <p style="color: #ff6b9d; font-size: 1.1rem;">
                                    Happy Valentine's Day, My Forever Love! 🌹
                                </p>
                            </div>
                        ` : ''}
                    </div>
                    
                    <style>
                        @keyframes photoFadeIn {
                            from { opacity: 0; transform: scale(0.9) translateY(20px); }
                            to { opacity: 1; transform: scale(1) translateY(0); }
                        }
                        
                        @keyframes messageFadeIn {
                            from { opacity: 0; transform: translateY(20px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        
                        @keyframes finalMessagePulse {
                            0%, 100% { transform: scale(1); }
                            50% { transform: scale(1.02); }
                        }
                        
                        .album-navigation button:not(:disabled):hover {
                            transform: translateY(-3px);
                            box-shadow: 0 6px 15px rgba(255,107,157,0.4);
                        }
                    </style>
                `;

                // Add event listeners
                const prevBtn = document.getElementById('prevPhoto');
                const nextBtn = document.getElementById('nextPhoto');
                
                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (currentPhoto > 0) {
                            currentPhoto--;
                            renderPhoto();
                        }
                    });
                }
                
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        if (currentPhoto < photos.length - 1) {
                            currentPhoto++;
                            renderPhoto();
                        }
                    });
                }

                // Keyboard navigation
                document.addEventListener('keydown', handleKeyboard);
                function handleKeyboard(e) {
                    if (e.key === 'ArrowLeft' && currentPhoto > 0) {
                        currentPhoto--;
                        renderPhoto();
                    } else if (e.key === 'ArrowRight' && currentPhoto < photos.length - 1) {
                        currentPhoto++;
                        renderPhoto();
                    } else if (e.key === 'Escape') {
                        modal.classList.remove('active');
                        document.removeEventListener('keydown', handleKeyboard);
                    }
                }
            }

            renderPhoto();
            modal.classList.add('active');
            
            // Create extra floating hearts for Valentine's Day
            const modalContent = document.querySelector('.modal-content');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animation = `float ${Math.random() * 3 + 2}s infinite ease-in-out`;
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                heart.style.opacity = '0.7';
                heart.style.pointerEvents = 'none';
                modalContent.appendChild(heart);
            }
        }

        function showBirthdayAlbum() {
            let currentPage = 0;
            const pages = [
                {
                    img: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=500&h=400&fit=crop',
                    text: 'Happy Birthday to the most amazing person in my life! 🎂 From the day we met, you\'ve brought endless joy and love into my world. Here\'s to celebrating you today and always!'
                },
                {
                    img: 'https://images.unsplash.com/photo-1513151233558-d860c5398176?w=500&h=400&fit=crop',
                    text: 'Every memory we\'ve created together is precious to me. Your smile, your laugh, the way you make everything better - these are the things I treasure most. Thank you for being you. 💕'
                },
                {
                    img: 'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=500&h=400&fit=crop',
                    text: 'As you celebrate another year, know that you\'re loved beyond measure. May this year bring you all the happiness, success, and love you deserve. Happy Birthday, my love! 🎉❤️'
                }
            ];

            function renderPage() {
                const page = pages[currentPage];
                modalBody.innerHTML = `
                    <div class="album-container">
                        <h2 style="text-align: center; color: #d63384; margin-bottom: 20px;">🎂 Happy Birthday! 🎂</h2>
                        <div class="album-page">
                            <img src="${page.img}" alt="Memory ${currentPage + 1}">
                            <p>${page.text}</p>
                        </div>
                        <div class="page-nav">
                            <button id="prevPage" ${currentPage === 0 ? 'disabled' : ''}>← Previous</button>
                            <span style="color: #d63384; font-weight: bold;">Page ${currentPage + 1} of ${pages.length}</span>
                            <button id="nextPage" ${currentPage === pages.length - 1 ? 'disabled' : ''}>Next →</button>
                        </div>
                    </div>
                `;

                // Add event listeners for navigation
                const prevBtn = document.getElementById('prevPage');
                const nextBtn = document.getElementById('nextPage');
                
                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (currentPage > 0) {
                            currentPage--;
                            renderPage();
                        }
                    });
                }
                
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        if (currentPage < pages.length - 1) {
                            currentPage++;
                            renderPage();
                        }
                    });
                }
            }

            renderPage();
            modal.classList.add('active');
        }

        function showLockedMessage(title, date) {
            modalBody.innerHTML = `
                <div class="locked-message">
                    <div style="font-size: 80px;">🔒</div>
                    <h2>${title}</h2>
                    <p>This special card will open on <strong>${date}</strong></p>
                    <p>Please wait for the magical day! 💕</p>
                    <div class="countdown">Coming Soon...</div>
                </div>
            `;
            modal.classList.add('active');
        }

        // Update card lock status on load
        window.addEventListener('load', function() {
            const today = new Date();
            const valentineCard = document.getElementById('valentineCard');
            const birthdayCard = document.getElementById('birthdayCard');

            // ⚠️ AUTOMATIC UNLOCK SYSTEM ⚠️
            // These cards will automatically unlock on their special dates
            // No action needed from you - just wait for the dates!
            
            // Check Valentine's Day - Auto unlocks on February 14
            if (today.getMonth() === 1) {
                valentineCard.classList.remove('locked');
                valentineCard.querySelector('.lock-icon').textContent = '🔓';
            }

            // Check Birthday - Auto unlocks on March 24
            if (today.getMonth() === 2 && today.getDate() === 24) {
                birthdayCard.classList.remove('locked');
                birthdayCard.querySelector('.lock-icon').textContent = '🔓';
            }
        });
    </script>
</body>
</html>
